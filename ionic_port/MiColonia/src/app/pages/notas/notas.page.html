<app-shell>
  <main class="page-content">
    <h1 class="page-title">Notas olfativas</h1>
    <p class="page-subtitle">Explora los ingredientes que componen las fragancias.</p>

    <div class="grid-3" *ngIf="!isLoading; else loadingTemplate">
      <a *ngFor="let note of notes"
         [routerLink]="['/nota']"
         [queryParams]="{ name: note.name }"
         class="note-card-link">
        <div class="note-card-visual">
          <img
            [src]="note.image || 'assets/img/notes/default.jpg'"
            [alt]="note.name"
            class="note-card-visual__image">
          <div class="note-card-visual__info">
            <h3 class="note-card-visual__name">{{ note.name }}</h3>
            <p class="note-card-visual__desc">
              {{ note.description || 'Descripción no disponible.' }}
            </p>
          </div>
        </div>
      </a>
    </div>

    <ng-template #loadingTemplate>
      <p class="page-subtitle">Cargando biblioteca de notas...</p>
    </ng-template>

    <p *ngIf="!isLoading && notes.length === 0">
      No se encontraron notas en la base de datos.
    </p>
  </main>
</app-shell>
