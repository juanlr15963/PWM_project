<app-shell>
  <main class="page-content auth-container">
    <div class="auth-card">
      <h1 class="page-title">Crear cuenta</h1>
      <p class="page-subtitle">Únete a MiColonia para guardar tus fragancias favoritas.</p>

      <form (submit)="onSubmit($event)">
        <div class="form-group">
          <label for="displayName">Nombre</label>
          <input
            type="text"
            id="displayName"
            name="displayName"
            [(ngModel)]="formData.displayName"
            placeholder="Tu nombre"
            required>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="formData.email"
            placeholder="ejemplo@correo.com"
            required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="formData.password"
            placeholder="Mínimo 6 caracteres"
            minlength="6"
            required>
        </div>

        <div *ngIf="errorMessage" class="error-banner">
          {{ errorMessage }}
        </div>

        <button type="submit" class="auth-submit-btn" [disabled]="isLoading">
          {{ isLoading ? 'Creando cuenta...' : 'Crear cuenta' }}
        </button>
      </form>

      <div class="auth-footer">
        <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
      </div>
    </div>
  </main>
</app-shell>
