<div class="navbar">
  <div class="navbar__container">
    <a routerLink="/" class="navbar__logo">
      <span class="navbar__logo-icon">M</span>
      <span class="navbar__logo-text">MiColonia.com</span>
    </a>

    <div class="navbar__search-container">
      <form class="navbar__search" (submit)="onSearch($event)">
        <input
          type="text"
          name="searchTerm"
          [(ngModel)]="searchTerm"
          placeholder="Buscar..."
          aria-label="Buscar"
          required />
      </form>
    </div>

    <div class="navbar__desktop-menu">
      <nav class="navbar__links">
        <a routerLink="/catalogo" routerLinkActive="active-link">Catálogo</a>
        <a routerLink="/notas" routerLinkActive="active-link">Notas</a>
        <a *ngIf="isLoggedIn" routerLink="/laboratorio" routerLinkActive="active-link">Laboratorio</a>
        <a *ngIf="isLoggedIn" routerLink="/mi-espacio" routerLinkActive="active-link">Mi Espacio</a>
      </nav>

      <div class="navbar__auth">
        <a *ngIf="!isLoggedIn" routerLink="/login" class="navbar__auth-btn">Iniciar Sesión</a>
        <button *ngIf="isLoggedIn" type="button" (click)="logout()" class="navbar__auth-btn navbar__auth-btn--logout">
          Cerrar Sesión
        </button>
      </div>
    </div>

    <button type="button" class="navbar__toggle" (click)="toggleMenu()" aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="navbar__mobile-menu" [class.is-open]="isMenuOpen">
    <nav class="navbar__mobile-links">
      <a routerLink="/catalogo" (click)="closeMenu()">Catálogo</a>
      <a routerLink="/notas" (click)="closeMenu()">Notas</a>
      <a *ngIf="isLoggedIn" routerLink="/laboratorio" (click)="closeMenu()">Laboratorio</a>
      <a *ngIf="isLoggedIn" routerLink="/mi-espacio" (click)="closeMenu()">Mi Espacio</a>
    </nav>
    <div class="navbar__mobile-auth">
      <a *ngIf="!isLoggedIn" routerLink="/login" class="navbar__auth-btn" (click)="closeMenu()">Iniciar Sesión</a>
      <a *ngIf="isLoggedIn" class="navbar__auth-btn" (click)="logout()">Cerrar Sesión</a>
    </div>
  </div>
</div>
