<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio — MiColonia</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/xlu-include-file.js"></script>
  <script src="js/manejo-sesion.js"></script>
  <script src="js/navbar-sesion.js"></script>
</head>
<body>
<header xlu-include-file="components/navbar.html"></header>

<main class="page-content">
  <h1 class="page-title">Laboratorio de Fragancias</h1>
  <p class="page-subtitle">Arrastra las notas para crear tu perfume personalizado.</p>

  <div class="lab-container">
    <!-- Columna de Notas Disponibles -->
    <div class="lab-notes-pool">
      <h3 class="lab-column__title">Notas Disponibles</h3>
      <div id="available-notes" class="lab-column__cards">
        <!-- Las notas se cargarán aquí -->
      </div>
    </div>

    <!-- Columnas de la Fragancia -->
    <div class="lab-creation-area">
      <input type="text" id="fragrance-name-input" class="lab-title-input" placeholder="Nombre de tu fragancia..." />
      <div class="lab-columns">
        <div class="lab-drop-zone" id="top-notes-zone" data-type="top">
          <h3 class="lab-column__title">Salida</h3>
          <div class="lab-column__cards"></div>
        </div>
        <div class="lab-drop-zone" id="heart-notes-zone" data-type="heart">
          <h3 class="lab-column__title">Corazón</h3>
          <div class="lab-column__cards"></div>
        </div>
        <div class="lab-drop-zone" id="base-notes-zone" data-type="base">
          <h3 class="lab-column__title">Base</h3>
          <div class="lab-column__cards"></div>
        </div>
      </div>
      <button id="save-fragrance-btn" class="lab-submit">Inmortalizar tu fragancia</button>
    </div>
  </div>
</main>

<footer xlu-include-file="components/footer.html"></footer>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const availableNotesContainer = document.getElementById('available-notes');
    const dropZones = document.querySelectorAll('.lab-drop-zone');
    const saveBtn = document.getElementById('save-fragrance-btn');
    let draggedItem = null;

    // Cargar notas disponibles
    fetch('http://localhost:3000/notes')
      .then(response => response.json())
      .then(notes => {
        notes.forEach(note => {
          const noteEl = createNoteElement(note);
          availableNotesContainer.appendChild(noteEl);
        });
      });

    function createNoteElement(note) {
      const noteEl = document.createElement('div');
      noteEl.className = 'note-card';
      noteEl.draggable = true;
      noteEl.dataset.noteName = note.name;
      noteEl.innerHTML = `<h4 class="note-card__name">${note.name}</h4><p class="note-card__desc">${note.type}</p>`;

      noteEl.addEventListener('dragstart', (e) => {
        draggedItem = e.target;
        setTimeout(() => e.target.style.display = 'none', 0);
      });

      noteEl.addEventListener('dragend', () => {
        setTimeout(() => {
            draggedItem.style.display = 'block';
            draggedItem = null;
        }, 0);
      });
      return noteEl;
    }

    dropZones.forEach(zone => {
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', () => {
        zone.classList.remove('drag-over');
      });
      zone.addEventListener('drop', (e) => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        if (draggedItem) {
          zone.querySelector('.lab-column__cards').appendChild(draggedItem);
        }
      });
    });

    saveBtn.addEventListener('click', () => {
      const fragranceName = document.getElementById('fragrance-name-input').value;
      const topNotes = Array.from(document.querySelectorAll('#top-notes-zone .note-card')).map(n => n.dataset.noteName);
      const heartNotes = Array.from(document.querySelectorAll('#heart-notes-zone .note-card')).map(n => n.dataset.noteName);
      const baseNotes = Array.from(document.querySelectorAll('#base-notes-zone .note-card')).map(n => n.dataset.noteName);

      if (!fragranceName) {
        alert('Por favor, dale un nombre a tu fragancia.');
        return;
      }

      const newFragrance = {
        name: fragranceName,
        notes: {
          top: topNotes,
          heart: heartNotes,
          base: baseNotes
        }
      };

      console.log('Fragancia Creada:', newFragrance);
      alert(`¡Fragancia "${fragranceName}" guardada en la consola!`);
      // Aquí iría la lógica para enviar al servidor (fetch POST) en el futuro.
    });

    xLuIncludeFile();
  });
</script>
</body>
</html>
