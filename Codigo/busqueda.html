<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Búsqueda — MiColonia</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/xlu-include-file.js"></script>
  <script src="js/manejo-sesion.js"></script>
  <script src="js/navbar-sesion.js"></script>
</head>
<body>
  <header xlu-include-file="components/navbar.html"></header>

  <main class="page-content">
    <h1 class="page-title">Resultados para "<span id="search-query"></span>"</h1>
    <p class="page-subtitle" id="search-subtitle"></p>

    <div id="fragrances-results">
      <h2 class="section-title">Fragancias Encontradas</h2>
      <div class="grid-4" id="fragrances-grid">
        <!-- Resultados de fragancias aquí -->
      </div>
    </div>

    <div id="notes-results" style="margin-top: 40px;">
      <h2 class="section-title">Notas Olfativas Encontradas</h2>
      <div class="grid-3" id="notes-grid">
        <!-- Resultados de notas aquí -->
      </div>
    </div>
  </main>

  <footer xlu-include-file="components/footer.html"></footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const query = params.get('q');

      const querySpan = document.getElementById('search-query');
      const subtitle = document.getElementById('search-subtitle');
      const fragrancesGrid = document.getElementById('fragrances-grid');
      const notesGrid = document.getElementById('notes-grid');
      const fragrancesResults = document.getElementById('fragrances-results');
      const notesResults = document.getElementById('notes-results');

      if (!query) {
        querySpan.textContent = '...';
        subtitle.textContent = 'Por favor, introduce un término de búsqueda.';
        fragrancesResults.style.display = 'none';
        notesResults.style.display = 'none';
        xLuIncludeFile();
        return;
      }

      querySpan.textContent = query;
      const lowerCaseQuery = query.toLowerCase();

      const fragrancesRequest = fetch('http://localhost:3000/fragrances').then(res => res.json());
      const notesRequest = fetch('http://localhost:3000/notes').then(res => res.json());

      Promise.all([fragrancesRequest, notesRequest])
        .then(([allFragrances, allNotes]) => {

          // Filtrar Fragancias
          const filteredFragrances = allFragrances.filter(f =>
            f.name.toLowerCase().includes(lowerCaseQuery) ||
            f.brand.toLowerCase().includes(lowerCaseQuery)
          );

          // Filtrar Notas
          const filteredNotes = allNotes.filter(n =>
            n.name.toLowerCase().includes(lowerCaseQuery)
          );

          subtitle.textContent = `Se encontraron ${filteredFragrances.length} fragancias y ${filteredNotes.length} notas.`;

          // Renderizar Fragancias
          if (filteredFragrances.length > 0) {
            fragrancesGrid.innerHTML = '';
            filteredFragrances.forEach(fragrance => {
              const cardLink = document.createElement('a');
              cardLink.href = `fragancia.html?id=${fragrance.id}`;
              cardLink.innerHTML = `
                <div class="fragrance-card">
                  <img src="${fragrance.image}" alt="${fragrance.name}" class="fragrance-card-image">
                  <div class="fragrance-card-info">
                    <h3 class="fragrance-card-name">${fragrance.name}</h3>
                    <p class="fragrance-card-brand">${fragrance.brand}</p>
                  </div>
                </div>
              `;
              fragrancesGrid.appendChild(cardLink);
            });
          } else {
            fragrancesResults.style.display = 'none';
          }

          // Renderizar Notas
          if (filteredNotes.length > 0) {
            notesGrid.innerHTML = '';
            filteredNotes.forEach(note => {
              const noteLink = document.createElement('a');
              noteLink.href = `nota.html?name=${encodeURIComponent(note.name)}`;
              noteLink.innerHTML = `
                <div class="note-card-visual">
                  <img src="${note.image || 'img/notes/default.jpg'}" alt="${note.name}" class="note-card-visual__image">
                  <div class="note-card-visual__info">
                    <h3 class="note-card-visual__name">${note.name}</h3>
                    <p class="note-card-visual__desc">${note.description}</p>
                  </div>
                </div>
              `;
              notesGrid.appendChild(noteLink);
            });
          } else {
            notesResults.style.display = 'none';
          }
        })
        .catch(error => {
          console.error('Error en la búsqueda:', error);
          subtitle.textContent = 'Ocurrió un error al realizar la búsqueda.';
        });

      xLuIncludeFile();
    });
  </script>
</body>
</html>
