<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Espacio — MiColonia</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/xlu-include-file.js"></script>
  <script src="js/manejo-sesion.js"></script>
  <script src="js/navbar-sesion.js"></script>
  <script src="js/navbar-toggle.js"></script>
</head>
<body>
<header xlu-include-file="components/navbar.html"></header>

<main class="page-content">
  <h1 class="page-title">Mi Espacio</h1>
  <p class="page-subtitle" id="welcome-message">Tu rincón personal de fragancias.</p>

  <section style="margin-bottom: 40px;">
    <h2 class="section-title">Mi Colección</h2>
    <div class="grid-4" id="collection-grid">
      <div class="placeholder-area">Cargando tu colección...</div>
    </div>
  </section>

  <section style="margin-bottom: 40px;">
    <h2 class="section-title">Notas Favoritas</h2>
    <div class="grid-3" id="notes-fav-grid">
      <div class="placeholder-area">Cargando tus notas favoritas...</div>
    </div>
  </section>
</main>

<footer xlu-include-file="components/footer.html"></footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const session = obtenerSesion();
        if (!session) {
            window.location.href = 'login.html';
            return;
        }

        // 1. Obtener los datos frescos del usuario
        fetch(`http://localhost:3000/users/${session.id}`)
            .then(res => res.json())
            .then(user => {
                document.getElementById('welcome-message').textContent = `Bienvenido, ${user.username}. Aquí tienes tus preferencias.`;

                // 2. Cargar Colección de Perfumes
                loadUserCollection(user.collection || []);

                // 3. Cargar Notas Favoritas
                loadUserNotes(user.favoriteNotes || []);
            });

        function loadUserCollection(collectionIds) {
            const container = document.getElementById('collection-grid');
            if (collectionIds.length === 0) {
                container.innerHTML = '<div class="placeholder-area">Aún no has añadido fragancias a tu colección.</div>';
                return;
            }

            fetch('http://localhost:3000/fragrances')
                .then(res => res.json())
                .then(allFragrances => {
                    container.innerHTML = '';
                    const myFragrances = allFragrances.filter(f => collectionIds.includes(f.id));
                    myFragrances.forEach(f => {
                        const cardLink = document.createElement('a');
                        cardLink.href = `fragancia.html?id=${f.id}`;
                        cardLink.innerHTML = `
                            <div class="fragrance-card">
                                <img src="${f.image}" class="fragrance-card-image">
                                <div class="fragrance-card-info">
                                    <h3 class="fragrance-card-name">${f.name}</h3>
                                    <p class="fragrance-card-brand">${f.brand}</p>
                                </div>
                            </div>
                        `;
                        container.appendChild(cardLink);
                    });
                });
        }

        function loadUserNotes(noteNames) {
            const container = document.getElementById('notes-fav-grid');
            if (noteNames.length === 0) {
                container.innerHTML = '<div class="placeholder-area">Aún no tienes notas favoritas.</div>';
                return;
            }

            fetch('http://localhost:3000/notes')
                .then(res => res.json())
                .then(allNotes => {
                    container.innerHTML = '';
                    const myNotes = allNotes.filter(n => noteNames.includes(n.name));
                    myNotes.forEach(n => {
                        const cardLink = document.createElement('a');
                        cardLink.href = `nota.html?name=${encodeURIComponent(n.name)}`;
                        cardLink.innerHTML = `
                            <div class="note-card-visual">
                                <img src="${n.image}" class="note-card-visual__image">
                                <div class="note-card-visual__info">
                                    <h3 class="note-card-visual__name">${n.name}</h3>
                                    <p class="note-card-visual__desc">${n.description}</p>
                                </div>
                            </div>
                        `;
                        container.appendChild(cardLink);
                    });
                });
        }

        xLuIncludeFile();
    });
</script>
</body>
</html>
