<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas Olfativas — MiColonia</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/xlu-include-file.js"></script>
  <script src="js/manejo-sesion.js"></script>
  <script src="js/navbar-sesion.js"></script>
</head>
<body>
  <header xlu-include-file="components/navbar.html"></header>
  <main class="page-content">
    <h1 class="page-title">Notas olfativas</h1>
    <p class="page-subtitle">Explora los ingredientes que componen las fragancias.</p>

    <div class="grid-2" id="notes-grid">
      <!-- Las notas se cargarán aquí dinámicamente -->
    </div>
  </main>

  <footer xlu-include-file="components/footer.html"></footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const grid = document.getElementById('notes-grid');

      fetch('http://localhost:3000/notes')
        .then(response => response.json())
        .then(notes => {
          grid.innerHTML = ''; // Limpiar contenido estático
          notes.forEach(note => {
            const noteCardLink = document.createElement('a');
            // Pasamos el nombre de la nota como parámetro en la URL
            noteCardLink.href = `nota.html?name=${encodeURIComponent(note.name)}`;
            noteCardLink.className = 'note-card-link';

            const noteCard = document.createElement('div');
            noteCard.className = 'note-card';

            const name = document.createElement('h3');
            name.className = 'note-card__name';
            name.textContent = note.name;

            const description = document.createElement('p');
            description.className = 'note-card__desc';
            description.textContent = note.description || 'Descripción no disponible.';

            noteCard.appendChild(name);
            noteCard.appendChild(description);
            noteCardLink.appendChild(noteCard);
            grid.appendChild(noteCardLink);
          });
        })
        .catch(error => {
          console.error('Error al cargar las notas:', error);
          grid.innerHTML = '<p>Error al cargar las notas. Por favor, inténtalo de nuevo más tarde.</p>';
        });

      xLuIncludeFile();
    });
  </script>
</body>
</html>
