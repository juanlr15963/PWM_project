<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragancia — MiColonia</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/xlu-include-file.js"></script>
    <script src="js/manejo-sesion.js"></script>
    <script src="js/navbar-sesion.js"></script>
    <script src="js/navbar-toggle.js"></script>
</head>
<body>
<header xlu-include-file="components/navbar.html"></header>

<main class="page-content">
    <div class="fragrance-header">
        <h1 class="page-title" id="fragancia-nombre">Cargando...</h1>
        <div class="fragrance-actions" id="fragrance-actions">
            <!-- Botón de guardar para la colección -->
        </div>
    </div>

    <div class="fragrance-detail">
        <div class="fragrance-detail__image" id="fragancia-imagen"></div>
        <div class="fragrance-detail__content">
            <p class="fragrance-brand" id="fragancia-marca"></p>
            <h2 class="section-title">Descripción</h2>
            <p id="fragancia-descripcion"></p>
            <div class="fragrance-detail__meta" id="fragancia-meta"></div>
            <div id="fragancia-notas-clasificadas"></div>
        </div>
    </div>
</main>

<footer xlu-include-file="components/footer.html"></footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const params = new URLSearchParams(window.location.search);
        const fragranceId = parseInt(params.get('id'), 10);
        const userSession = obtenerSesion();

        if (!fragranceId) {
            document.getElementById('fragancia-nombre').textContent = 'Fragancia no encontrada';
            return;
        }

        const fragranceRequest = fetch(`http://localhost:3000/fragrances/${fragranceId}`).then(res => res.json());
        const notesListRequest = fetch('http://localhost:3000/notes').then(res => res.json());
        const userRequest = userSession ? fetch(`http://localhost:3000/users/${userSession.id}`).then(res => res.json()) : Promise.resolve(null);

        Promise.all([fragranceRequest, notesListRequest, userRequest])
            .then(([fragrance, allNotes, userData]) => {
                if (!fragrance) throw new Error('La fragancia no existe');

                document.title = `${fragrance.name} — MiColonia`;
                document.getElementById('fragancia-nombre').textContent = fragrance.name;
                document.getElementById('fragancia-marca').textContent = fragrance.brand;
                document.getElementById('fragancia-descripcion').textContent = fragrance.description || '';

                const imageContainer = document.getElementById('fragancia-imagen');
                imageContainer.innerHTML = '';
                const imgElement = document.createElement('img');
                imgElement.src = fragrance.image;
                imgElement.alt = fragrance.name;
                imageContainer.appendChild(imgElement);

                const metaContainer = document.getElementById('fragancia-meta');
                metaContainer.innerHTML = '';
                if (fragrance.season) fragrance.season.forEach(s => metaContainer.appendChild(createTag(s, `season--${s.toLowerCase()}`)));
                if (fragrance.time) metaContainer.appendChild(createTag(fragrance.time, `time--${fragrance.time.toLowerCase()}`));

                renderClassifiedNotes(fragrance.notes, allNotes);

                if (userData) {
                    renderUserActions(fragrance, userData);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('fragancia-nombre').textContent = 'Error al cargar';
            });

        function createTag(text, className) {
            const tag = document.createElement('span');
            tag.className = `tag ${className}`;
            tag.textContent = text;
            return tag;
        }

        function renderClassifiedNotes(notes, allNotes) {
            const container = document.getElementById('fragancia-notas-clasificadas');
            container.innerHTML = '';
            const types = ['top', 'heart', 'base'];
            const titles = { top: 'Salida', heart: 'Corazón', base: 'Base' };

            types.forEach(type => {
                if (notes[type] && notes[type].length > 0) {
                    const group = document.createElement('div');
                    group.className = 'notes-group';
                    const title = document.createElement('h3');
                    title.className = 'notes-group__title';
                    title.textContent = titles[type];
                    group.appendChild(title);

                    const tagsContainer = document.createElement('div');
                    tagsContainer.className = 'fragrance-detail__tags';
                    notes[type].forEach(noteName => {
                        const noteData = allNotes.find(n => n.name === noteName);
                        const tagLink = document.createElement('a');
                        tagLink.href = `nota.html?name=${encodeURIComponent(noteName)}`;
                        tagLink.className = 'tag';
                        if (noteData && noteData.image) {
                            const img = document.createElement('img');
                            img.src = noteData.image;
                            tagLink.appendChild(img);
                        }
                        tagLink.appendChild(document.createTextNode(noteName));
                        tagsContainer.appendChild(tagLink);
                    });
                    group.appendChild(tagsContainer);
                    container.appendChild(group);
                }
            });
        }

        function renderUserActions(fragrance, user) {
            const actionsContainer = document.getElementById('fragrance-actions');
            actionsContainer.innerHTML = '';

            const inCollection = user.collection && user.collection.includes(fragrance.id);

            const collectionButton = document.createElement('button');
            collectionButton.className = `action-btn ${inCollection ? 'active' : ''}`;
            collectionButton.innerHTML = '💾'; // Guardar
            collectionButton.title = inCollection ? 'Quitar de mi colección' : 'Añadir a mi colección';
            collectionButton.onclick = () => toggleUserArray('collection', fragrance.id, user);

            actionsContainer.appendChild(collectionButton);
        }

        function toggleUserArray(arrayName, fragranceId, user) {
            const currentArray = user[arrayName] || [];
            const index = currentArray.indexOf(fragranceId);

            if (index > -1) {
                currentArray.splice(index, 1);
            } else {
                currentArray.push(fragranceId);
            }

            fetch(`http://localhost:3000/users/${user.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ [arrayName]: currentArray })
            })
            .then(res => res.json())
            .then(updatedUser => {
                renderUserActions(fragrance, updatedUser);
            })
            .catch(console.error);
        }

        xLuIncludeFile();
    });
</script>
</body>
</html>
