<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragancia — MiColonia</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/xlu-include-file.js"></script>
    <!-- Mantenemos estos dos del PULL para el sistema de usuarios -->
    <script src="js/manejo-sesion.js"></script>
    <script src="js/navbar-sesion.js"></script>
</head>
<body>
<header xlu-include-file="components/navbar.html"></header>

<main class="page-content">
    <h1 class="page-title" id="fragancia-nombre">Cargando...</h1>

    <div class="fragrance-detail">
        <div class="fragrance-detail__image" id="fragancia-imagen">
            <!-- La imagen se cargará aquí dinámicamente -->
        </div>
        <div class="fragrance-detail__content">
            <p class="fragrance-brand" id="fragancia-marca"></p>

            <div class="fragrance-detail__meta" id="fragancia-meta">
                <!-- La estación y el momento del día se cargarán aquí -->
            </div>

            <h2 class="section-title">Descripción</h2>
            <p id="fragancia-descripcion"></p>

            <h2 class="section-title" style="margin-top: 24px;">Notas olfativas</h2>
            <div class="fragrance-detail__tags" id="fragancia-notas">
                <!-- Las notas se cargarán aquí dinámicamente -->
            </div>
        </div>
    </div>
</main>

<footer xlu-include-file="components/footer.html"></footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const params = new URLSearchParams(window.location.search);
        const fragranceId = params.get('id');

        if (!fragranceId) {
            document.getElementById('fragancia-nombre').textContent = 'Fragancia no encontrada';
            return;
        }

        // Realizar dos fetches en paralelo: uno para la fragancia y otro para todas las notas
        const fragranceRequest = fetch(`http://localhost:3000/fragrances/${fragranceId}`).then(res => res.json());
        const notesListRequest = fetch('http://localhost:3000/notes').then(res => res.json());

        Promise.all([fragranceRequest, notesListRequest])
            .then(([fragrance, allNotes]) => {
                if (!fragrance) throw new Error('La fragancia no existe');

                document.title = `${fragrance.name} — MiColonia`;
                document.getElementById('fragancia-nombre').textContent = fragrance.name;
                document.getElementById('fragancia-marca').textContent = fragrance.brand;

                const imageContainer = document.getElementById('fragancia-imagen');
                imageContainer.innerHTML = '';
                const imgElement = document.createElement('img');
                imgElement.src = fragrance.image;
                imgElement.alt = fragrance.name;
                imageContainer.appendChild(imgElement);

                document.getElementById('fragancia-descripcion').textContent = fragrance.description || 'Descripción no disponible.';

                const metaContainer = document.getElementById('fragancia-meta');
                metaContainer.innerHTML = '';

                if (fragrance.season && fragrance.season.length > 0) {
                    fragrance.season.forEach(seasonName => {
                        const seasonTag = document.createElement('span');
                        seasonTag.className = `tag season-tag season--${seasonName.toLowerCase()}`;
                        seasonTag.textContent = seasonName;
                        metaContainer.appendChild(seasonTag);
                    });
                }

                if (fragrance.time) {
                    const timeTag = document.createElement('span');
                    timeTag.className = `tag time-tag time--${fragrance.time.toLowerCase()}`;
                    timeTag.textContent = fragrance.time;
                    metaContainer.appendChild(timeTag);
                }

                const notesContainer = document.getElementById('fragancia-notas');
                notesContainer.innerHTML = '';

                const fragranceNotes = [...(fragrance.notes.top || []), ...(fragrance.notes.heart || []), ...(fragrance.notes.base || [])];

                fragranceNotes.forEach(noteName => {
                    const noteData = allNotes.find(n => n.name === noteName); // Buscar la nota en la lista completa
                    const tag = document.createElement('span');
                    tag.className = 'tag';

                    if (noteData && noteData.image) {
                        const noteImg = document.createElement('img');
                        noteImg.src = noteData.image;
                        noteImg.alt = noteData.name;
                        tag.appendChild(noteImg);
                    }

                    const text = document.createTextNode(noteName);
                    tag.appendChild(text);
                    notesContainer.appendChild(tag);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('fragancia-nombre').textContent = 'Error al cargar';
            });

        xLuIncludeFile();
    });
</script>
</body>
</html>
