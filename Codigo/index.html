<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio — MiColonia</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/xlu-include-file.js"></script>
  <script src="js/manejo-sesion.js"></script>
  <script src="js/navbar-sesion.js"></script>
</head>
<body>
  <header xlu-include-file="components/navbar.html"></header>

  <main class="page-content">
    <section class="hero">
      <h1 class="page-title">Tu firma olfativa.</h1>
      <p class="page-subtitle">Explora fragancias seleccionadas por nuestro equipo de expertos y curadores.</p>
    </section>

    <section class="featured-fragrances">
      <div class="grid-4">
        <div class="fragrance-card" xlu-include-file="components/fragrance-card-template.html"
             data-name="Brisa Nocturna"
             data-description="Frescura marina con toques cítricos"
             data-image=""
             data-link="fragancia.html">
        </div>
        <div class="fragrance-card" xlu-include-file="components/fragrance-card-template.html"
             data-name="Madera &amp; Ámbar"
             data-description="Calidez profunda para el invierno"
             data-image=""
             data-link="fragancia.html">
        </div>
        <div class="fragrance-card" xlu-include-file="components/fragrance-card-template.html"
             data-name="Jardín Secreto"
             data-description="Floral delicado con notas verdes"
             data-image=""
             data-link="fragancia.html">
        </div>
        <div class="fragrance-card" xlu-include-file="components/fragrance-card-template.html"
             data-name="Luna de Verano"
             data-description="Jazmín y vainilla bajo las estrellas"
             data-image=""
             data-link="fragancia.html">
        </div>
      </div>
    </section>

    <section class="notes-banner">
      <div class="note-card note-card--banner" xlu-include-file="components/note-card-template.html"
           data-name="Explorador de Notas e Ingredientes"
           data-description="¿Buscas una esencia específica? Navega por nuestra biblioteca para descubrir perfumes según sus componentes."
           data-link="notas.html">
      </div>
    </section>
  </main>

  <footer xlu-include-file="components/footer.html"></footer>

  <script>xLuIncludeFile();</script>
</body>
</html>
