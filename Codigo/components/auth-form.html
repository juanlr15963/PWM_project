<div class="auth-form">
    <div class="auth-form__avatar">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
        </svg>
    </div>
    <div class="auth-form__fields">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="correo@ejemplo.com" />
        <span class="auth-form__error" id="email-error"></span>

        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" />
        <span class="auth-form__error" id="password-error"></span>
    </div>
    <button class="auth-form__submit" id="btn-login">Sign-in</button>
    <p class="auth-form__success" id="login-success">Inicio de sesión correcto</p>
</div>
