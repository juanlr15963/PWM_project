<a href="#" onclick="redirectToPage(event, this.closest('.fragrance-card'), '{{link}}')" class="fragrance-card__link">
  <div class="fragrance-card__image" style="background-image: url('{{image}}')">
    <div class="fragrance-card__image-placeholder"></div>
  </div>
  <div class="fragrance-card__info">
    <p class="fragrance-card__name">{{name}}</p>
    <p class="fragrance-card__desc">{{description}}</p>
  </div>
</a>
