<div class="navbar">
  <div class="navbar__container">
    <!-- 1. Logo -->
    <a routerLink="/" class="navbar__logo">
      <span class="navbar__logo-icon">M</span>
      <span class="navbar__logo-text">MiColonia.com</span>
    </a>

    <!-- 2. Buscador Central -->
    <div class="navbar__search-container">
      <form class="navbar__search" (submit)="onSearch($event)">
        <input
          type="text"
          [(ngModel)]="searchTerm"
          name="searchTerm"
          placeholder="Buscar..."
          aria-label="Buscar"
          required />
      </form>
    </div>

    <!-- 3. Menú Desktop -->
    <div class="navbar__desktop-menu">
      <nav class="navbar__links">
        <a routerLink="/catalogo" routerLinkActive="active-link">Catálogo</a>
        <!-- Solo se muestra si el usuario está logueado -->
        <a *ngIf="isLoggedIn" routerLink="/laboratorio" routerLinkActive="active-link">Laboratorio</a>
        <a *ngIf="isLoggedIn" routerLink="/mi-espacio" routerLinkActive="active-link">Mi Espacio</a>
      </nav>

      <div class="navbar__auth">
        <!-- Si NO está logueado: Iniciar Sesión -->
        <a *ngIf="!isLoggedIn" routerLink="/login" class="navbar__auth-btn">Iniciar Sesión</a>

        <!-- Si SÍ está logueado: Cerrar Sesión -->
        <button *ngIf="isLoggedIn" (click)="logout()" class="navbar__auth-btn navbar__auth-btn--logout">
          Cerrar Sesión
        </button>
      </div>
    </div>

    <!-- 4. Botón Hamburguesa -->
    <button class="navbar__toggle" (click)="toggleMenu()" aria-label="Abrir menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- 5. Menú Desplegable Móvil -->
  <div class="navbar__mobile-menu" [ngClass]="{ 'is-open': isMenuOpen }">
    <nav class="navbar__mobile-links">
      <a routerLink="/catalogo" (click)="toggleMenu()">Catálogo</a>
      <!-- Laboratorio oculto en móvil si no hay sesión -->
      <a *ngIf="isLoggedIn" routerLink="/laboratorio" (click)="toggleMenu()">Laboratorio</a>
    </nav>
    <div class="navbar__mobile-auth">
      <a *ngIf="!isLoggedIn" routerLink="/login" class="navbar__auth-btn" (click)="toggleMenu()">Iniciar Sesión</a>

      <!-- Botón de Logout en móvil -->
      <a *ngIf="isLoggedIn" (click)="logout(); toggleMenu()" class="navbar__auth-btn">Cerrar Sesión</a>
    </div>
  </div>
</div>
