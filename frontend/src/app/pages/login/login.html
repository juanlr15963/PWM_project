<main class="page-content auth-container">
  <div class="auth-card">
    <h1 class="page-title">Bienvenido</h1>
    <p class="page-subtitle">Introduce tus credenciales para acceder.</p>

    <form (submit)="onSubmit($event)" class="auth-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="loginData.email"
          placeholder="ejemplo@correo.com"
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="loginData.password"
          placeholder="••••••••"
          required>
      </div>

      <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
      </div>

      <button type="submit" class="auth-submit-btn" [disabled]="isLoading">
        {{ isLoading ? 'Cargando...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
    </div>
  </div>
</main>
