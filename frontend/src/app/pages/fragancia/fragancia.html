<main class="page-content" *ngIf="fragrance; else loading">
  <div class="fragrance-header">
    <h1 class="page-title">{{ fragrance.name }}</h1>
    <div class="fragrance-actions">
      <!-- Botón de colección (solo se muestra si el usuario está logueado) -->
      <button
        *ngIf="isLoggedIn"
        class="action-btn"
        [class.active]="isInCollection"
        (click)="toggleCollection()">
        💾
      </button>
    </div>
  </div>

  <div class="fragrance-detail">
    <div class="fragrance-detail__image">
      <img [src]="fragrance.image" [alt]="fragrance.name">
    </div>

    <div class="fragrance-detail__content">
      <div class="brand-section">
        <h2 class="section-title">Marca</h2>
        <p class="fragrance-brand">{{ fragrance.brand }}</p>

        <ng-container *ngIf="fragrance.description">
          <h2 class="section-title" style="margin-top: 24px;">Descripción</h2>
          <p>{{ fragrance.description }}</p>
        </ng-container>
      </div>

      <div class="fragrance-detail__meta">
        <!-- Tags de Temporada -->
        <span *ngFor="let s of fragrance.season"
              class="tag"
              [ngClass]="'season--' + s.toLowerCase()">
          {{ s }}
        </span>
        <!-- Tag de Momento (Día/Noche) -->
        <span *ngIf="fragrance.time"
              class="tag"
              [ngClass]="'time--' + fragrance.time.toLowerCase()">
          {{ fragrance.time }}
        </span>
      </div>

      <!-- Notas Clasificadas -->
      <div class="notes-container">
        <div class="notes-group" *ngFor="let type of noteTypes">
          <ng-container *ngIf="fragrance.notes[type.key]?.length">
            <h3 class="notes-group__title">{{ type.label }}</h3>
            <div class="fragrance-detail__tags">
              <a *ngFor="let noteName of fragrance.notes[type.key]"
                 [routerLink]="['/nota', noteName]"
                 class="tag">
                <img *ngIf="getNoteImage(noteName)" [src]="getNoteImage(noteName)" alt="">
                {{ noteName }}
              </a>
            </div>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
</main>

<ng-template #loading>
  <div class="page-content">
    <h1 class="page-title">Cargando fragancia...</h1>
  </div>
</ng-template>
