<main class="page-content">
  <h1 class="page-title">Laboratorio de Fragancias</h1>
  <p class="page-subtitle">Arrastra las notas para crear tu perfume personalizado.</p>

  <div class="lab-container">
    <!-- Columna de Notas Disponibles -->
    <div class="lab-notes-pool">
      <h3 class="lab-column__title">Notas Disponibles</h3>
      <div class="lab-column__cards"
           (dragover)="onDragOver($event)"
           (drop)="onDrop($event, availableNotes)">
        <div *ngFor="let note of availableNotes"
             class="note-card"
             draggable="true"
             (dragstart)="onDragStart(note, availableNotes)">
          <h4 class="note-card__name">{{ note.name }}</h4>
        </div>
      </div>
    </div>

    <!-- Áreas de Creación -->
    <div class="lab-creation-area">
      <input type="text" [(ngModel)]="fragranceName" class="lab-title-input" placeholder="Nombre de tu fragancia..." />

      <div class="lab-columns">
        <!-- Salida -->
        <div class="lab-drop-zone" (dragover)="onDragOver($event)" (drop)="onDrop($event, topNotes)">
          <h3 class="lab-column__title">Salida</h3>
          <div class="lab-column__cards">
            <div *ngFor="let note of topNotes" class="note-card" draggable="true" (dragstart)="onDragStart(note, topNotes)">
              <h4 class="note-card__name">{{ note.name }}</h4>
            </div>
          </div>
        </div>

        <!-- Corazón -->
        <div class="lab-drop-zone" (dragover)="onDragOver($event)" (drop)="onDrop($event, heartNotes)">
          <h3 class="lab-column__title">Corazón</h3>
          <div class="lab-column__cards">
            <div *ngFor="let note of heartNotes" class="note-card" draggable="true" (dragstart)="onDragStart(note, heartNotes)">
              <h4 class="note-card__name">{{ note.name }}</h4>
            </div>
          </div>
        </div>

        <!-- Base -->
        <div class="lab-drop-zone" (dragover)="onDragOver($event)" (drop)="onDrop($event, baseNotes)">
          <h3 class="lab-column__title">Base</h3>
          <div class="lab-column__cards">
            <div *ngFor="let note of baseNotes" class="note-card" draggable="true" (dragstart)="onDragStart(note, baseNotes)">
              <h4 class="note-card__name">{{ note.name }}</h4>
            </div>
          </div>
        </div>
      </div>

      <button (click)="saveFragrance()" class="lab-submit">Inmortalizar tu fragancia</button>
    </div>
  </div>
</main>
